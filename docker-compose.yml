# ═══════════════════════════════════════════════════════════════════════
# SVTR Bot — Docker Compose (Phase 4: Full Production Stack)
# ═══════════════════════════════════════════════════════════════════════
# Services:
#   svtr-bot     — Trading bot (FastAPI webhook server)
#   redis        — State cache & pub/sub
#   prometheus   — Metrics collection
#   grafana      — Dashboard visualization
#
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose up -d svtr-bot           # Start bot only
#   docker compose logs -f svtr-bot         # Follow bot logs
#   docker compose down                     # Stop all services
# ═══════════════════════════════════════════════════════════════════════

services:
  # ── Trading Bot ─────────────────────────────────────────────────
  svtr-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: svtr-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - svtr-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  # ── Redis (state cache) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: svtr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - svtr-net
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Prometheus (metrics) ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: svtr-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - svtr-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Grafana (dashboard) ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: svtr-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=svtr-bot-2024
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/svtr-bot.json
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - svtr-net
    deploy:
      resources:
        limits:
          memory: 256M

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  redis-data:
  prometheus-data:
  grafana-data:

# ── Networks ─────────────────────────────────────────────────────────
networks:
  svtr-net:
    driver: bridge
