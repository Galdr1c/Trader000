# SVTR Bot — Prometheus configuration
# Scrapes metrics from the svtr-bot service every 15 seconds

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    monitor: 'svtr-bot-monitor'
    env: 'production'

# ── Alertmanager (optional, uncomment if you set up alerts) ───────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['localhost:9093']

# ── Scrape jobs ────────────────────────────────────────────────────
scrape_configs:
  # Trading bot — primary metrics source
  - job_name: 'svtr-bot'
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['svtr-bot:8000']
        labels:
          service: 'trading-bot'
          component: 'core'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'monitoring'
          component: 'prometheus'

  # Redis exporter (optional — uncomment if you add redis_exporter)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #       labels:
  #         service: 'cache'
  #         component: 'redis'

  # Node exporter (optional — for host metrics)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #       labels:
  #         service: 'host'
  #         component: 'system'
