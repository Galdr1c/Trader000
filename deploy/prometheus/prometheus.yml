# ═══════════════════════════════════════════════════════════════════════
# Prometheus Configuration — SVTR Bot Metrics
# ═══════════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── Bot metrics (from /metrics endpoint) ────────────────────────
  - job_name: "svtr-bot"
    metrics_path: /metrics
    static_configs:
      - targets: ["svtr-bot:8000"]
        labels:
          service: "svtr-bot"
    scrape_interval: 10s

  # ── Prometheus self-monitoring ──────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
